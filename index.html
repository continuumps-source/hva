<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HVA Readify — Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* chrome — calm slate so the risk colours carry the meaning */
        --ink: #0f172a;
        --slate: #475569;
        --slate-soft: #64748b;
        --hairline: #e2e8f0;
        --surface: #ffffff;
        --canvas: #f8fafc;
        --canvas-2: #f1f5f9;
        --accent: #4338ca;
        --accent-soft: #eef2ff;
        --accent-ink: #3730a3;
        /* risk ramp */
        --risk-vhigh: #dc2626;
        --risk-high: #ea580c;
        --risk-med: #d97706;
        --risk-low: #16a34a;
        /* depth */
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 2px 4px rgba(15, 23, 42, 0.04), 0 6px 16px rgba(15, 23, 42, 0.08);
        --radius: 14px;
        --radius-sm: 9px;
        --font-display: "Manrope", system-ui, sans-serif;
        --font-body: "Inter", system-ui, sans-serif;
      }
      html, body, #root { margin: 0; height: 100%; }
      body {
        background: var(--canvas);
        font-family: var(--font-body);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      * { box-sizing: border-box; }
      /* tabular figures for all data so number columns align */
      .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
      @media print {
        body { background: #fff; }
        .no-print { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
